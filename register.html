<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Past Questions Archive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .logo{
            margin-left: 700px;
            width: 400px;
            margin-top: 150px;
        }
        .form-container{
            margin-top: -400px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>School Past Questions Archive</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html" class="active">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="auth-form">
            <div class="container">
                <img src="img/logo.png" alt="logo" class="logo">
                <div class="form-container">
                    <!-- <img src="img/logo.png" alt="logo" class="logo"> -->
                    <h2>Create Account</h2>
                    <form id="registerForm" action="php/register.php" method="POST">
                        <div class="form-group">
                            <label for="matric_number">Matric Number</label>
                            <input type="text" id="matric_number" name="matric_number" required>
                            <small>Format: CE2024010001 (CE=Department, 2024=Year, 01=Full-time/02=Part-time, 0001=Number)</small>
                        </div>
                        <div class="form-group">
                            <label for="full_name">Full Name</label>
                            <input type="text" id="full_name" name="full_name" required>
                        </div>
                        <div class="form-group">
                            <label for="sex">Sex</label>
                            <select id="sex" name="sex" required>
                                <option value="">Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="department">Department</label>
                            <select id="department" name="department" required>
                                <option value="">Select Department</option>
                                <!-- Options will be populated by JavaScript -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" id="confirm_password" name="confirm_password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 School Past Questions Archive. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/register.js"></script>
</body>
</html>
